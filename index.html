<!doctype html>
<html lang="pt-BR" data-theme="black">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BoxLab — Calculadora de Cubagem CSSBuy</title>

    <!-- Inter font for clean numeric UI -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- daisyUI v5 + Tailwind v4 (Play CDN, no build step) -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Importmap for ES module aliases (three) -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
        }
      }
    </script>

    <style>
      /* ── Theme override ──────────────────────────────────────
         Classic black background with a solid green primary.
         daisyUI uses OKLCH for theme variables. */
      [data-theme="black"] {
        --color-base-100: oklch(0% 0 0);              /* pure black */
        --color-base-200: oklch(10% 0 0);             /* very dark gray */
        --color-base-300: oklch(16% 0 0);
        --color-base-content: oklch(96% 0 0);

        --color-primary: oklch(74% 0.20 142);         /* solid green (green-500-ish) */
        --color-primary-content: oklch(20% 0.05 142);

        --color-secondary: oklch(70% 0.15 220);
        --color-accent: oklch(74% 0.20 142);          /* same green as primary */

        --color-success: oklch(74% 0.20 142);
        --color-warning: oklch(80% 0.18 80);
        --color-error: oklch(65% 0.25 30);
        --color-info: oklch(70% 0.15 220);
      }

      html, body { height: 100%; }
      body {
        background: #000;
        color: oklch(96% 0 0);
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
      }

      /* ── 3D viewport ──────────────────────────────────────── */
      #three-viewport {
        width: 100%;
        aspect-ratio: 16 / 10;
        background: linear-gradient(180deg, #050505 0%, #000 100%);
        border-radius: var(--radius-box);
        border: 1px solid oklch(20% 0 0);
      }

      /* ── Editable value pill (custom helper not in daisyUI) ── */
      .pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 3.4rem;
        padding: 0.2rem 0.55rem;
        border-radius: var(--radius-field);
        background: color-mix(in oklab, var(--color-primary) 12%, transparent);
        color: var(--color-primary);
        font-weight: 600;
        font-size: 0.85rem;
        font-variant-numeric: tabular-nums;
        border: 1px solid color-mix(in oklab, var(--color-primary) 25%, transparent);
        cursor: text;
        transition: all 120ms ease;
      }
      .pill:hover {
        background: color-mix(in oklab, var(--color-primary) 18%, transparent);
        border-color: color-mix(in oklab, var(--color-primary) 40%, transparent);
      }

      /* daisyUI's range with primary-themed thumb already covers most needs;
         tighten the height a bit and force solid (non-gradient) fill. */
      input[type="range"].range {
        --range-shdw: var(--color-primary);
      }

      .tabular { font-variant-numeric: tabular-nums; }

      /* Modal backdrop (works for both div.modal.modal-open and dialog.modal) */
      .modal.modal-open,
      dialog.modal[open] {
        background: rgba(0, 0, 0, 0.65);
        backdrop-filter: blur(4px);
      }
      dialog.modal::backdrop {
        background: rgba(0, 0, 0, 0.65);
        backdrop-filter: blur(4px);
      }
    </style>
  </head>
  <body class="antialiased">
    <div id="app" class="min-h-screen p-4 lg:p-8 max-w-[1400px] mx-auto">
      <header class="mb-8 flex items-center gap-3">
        <span class="text-2xl text-primary">▣</span>
        <div>
          <h1 class="text-xl font-bold tracking-tight">BoxLab</h1>
          <p class="text-xs text-base-content/60">Calculadora 3D de cubagem · CSSBuy · Brasil</p>
        </div>
      </header>

      <main class="grid lg:grid-cols-2 gap-5">
        <section id="form-column" class="space-y-5">
          <div id="items-mount"></div>
          <div id="packaging-mount"></div>
        </section>
        <section id="preview-column" class="space-y-5">
          <div id="three-viewport-wrap" class="relative">
            <div id="three-viewport"></div>
            <button id="reset-camera" class="btn btn-xs btn-ghost absolute top-3 right-3 backdrop-blur">Reset câmera</button>
          </div>
          <div id="results"></div>
        </section>
      </main>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
